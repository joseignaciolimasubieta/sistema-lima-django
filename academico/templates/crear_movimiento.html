{% extends 'base.html' %}
{% block content %}
{% if messages %}
<div id="toast-container" class="fixed top-6 right-6 z-[200] flex flex-col gap-3">
    {% for message in messages %}
    <div class="toast-message bg-white/90 backdrop-blur-xl text-gray-900 px-5 py-4 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-200/50 flex items-center gap-3.5 transform transition-all duration-300 translate-x-10 opacity-0">
        <div class="{% if message.tags == 'error' %}bg-rose-500{% else %}bg-[#0071e3]{% endif %} p-1.5 rounded-full flex items-center justify-center shadow-sm shrink-0">
            {% if message.tags == 'error' %}
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            {% else %}
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            {% endif %}
        </div>
        <p class="text-sm font-bold tracking-tight">{{ message }}</p>
    </div>
    {% endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toasts = document.querySelectorAll('.toast-message');
        toasts.forEach(toast => {
            setTimeout(() => {
                toast.classList.remove('translate-x-10', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        });
    });
</script>
{% endif %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<div class="max-w-3xl mx-auto px-4 pt-10 pb-16 animate-fade-in relative z-10 font-sans">
    
    <div class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
        <div class="space-y-2">
            <h1 class="text-3xl md:text-4xl font-bold text-black tracking-tight">Nuevo Registro.</h1>
        </div>
        <a href="{% url 'flujo_caja' %}" class="shrink-0 inline-flex items-center justify-center gap-2 h-9 px-5 rounded-full bg-white hover:bg-gray-50 text-gray-800 border border-gray-300 text-xs font-semibold transition-all shadow-sm">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver a Caja
        </a>
    </div>

    <form method="POST" class="bg-white rounded-[1.5rem] shadow-sm border border-gray-200 overflow-hidden">
        {% csrf_token %}
        <div class="bg-white px-8 py-6 border-b border-gray-100">
            <h3 class="text-[11px] font-bold text-black uppercase tracking-widest flex items-center gap-2">
                <svg class="w-4 h-4 text-[#0071e3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Detalles de la Transacción
            </h3>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Fecha de Operación</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none z-10">
                            <svg class="w-4 h-4 text-[#0071e3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <input type="text" id="fecha" name="fecha" required value="{% now 'Y-m-d' %}" class="hidden">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Tipo de Movimiento</label>
                    <select name="tipo" required class="w-full h-10 bg-gray-50 border border-gray-200 rounded-xl px-3 text-sm font-bold text-black outline-none focus:border-[#0071e3] focus:ring-1 focus:ring-[#0071e3] transition-all cursor-pointer">
                        <option value="ENTRADA">ENTRADA (Ingreso)</option>
                        <option value="SALIDA">SALIDA (Egreso)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Detalle / Concepto</label>
                <input type="text" name="detalle" required placeholder="Ej. Pago de servicios de internet..." class="w-full h-10 bg-gray-50 border border-gray-200 rounded-xl px-3 text-sm font-semibold text-black outline-none focus:border-[#0071e3] focus:ring-1 focus:ring-[#0071e3] transition-all uppercase placeholder-gray-400">
            </div>

            <div class="bg-gray-50/50 p-6 rounded-2xl border border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Cuenta de Caja</label>
                    <select name="cuenta" required class="w-full h-12 bg-white border border-gray-200 rounded-xl px-4 text-sm font-bold text-black outline-none focus:border-[#0071e3] focus:ring-1 focus:ring-[#0071e3] transition-all cursor-pointer shadow-sm">
                        {% for value, text in form.cuenta.field.choices %}
                            {% if value %}
                            <option value="{{ value }}">{{ text }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Monto (Bs)</label>
                    <input type="number" step="0.01" name="monto" required placeholder="0.00" class="w-full h-12 bg-white border border-gray-200 rounded-xl px-4 text-lg font-bold text-[#0071e3] text-right outline-none focus:border-[#0071e3] focus:ring-1 focus:ring-[#0071e3] transition-all shadow-sm">
                </div>
            </div>
        </div>

        <div class="bg-white px-8 py-5 border-t border-gray-100 flex justify-between items-center">
            <div> </div>
            <div class="order-1 md:order-2 flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <a href="{% url 'flujo_caja' %}" class="inline-flex items-center justify-center h-10 px-6 rounded-full text-xs font-semibold text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="inline-flex items-center justify-center h-10 px-8 rounded-full text-xs font-semibold text-white bg-[#0071e3] hover:bg-[#0077ED] shadow-md transition-all active:scale-95">
                    Guardar Movimiento
                </button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr("#fecha", {
            locale: "es",
            disableMobile: true, // 🚀 1. OBLIGA a usar este diseño en celulares
            dateFormat: "Y-m-d", 
            altInput: true,      
            altFormat: "j \\de F, Y", 
            defaultDate: new Date(), 
            
            // 🚀 2. PARCHE PARA IPHONE Y ANDROID: Evita que el teclado tape el calendario
            onReady: function(selectedDates, dateStr, instance) {
                if (instance.altInput) {
                    instance.altInput.removeAttribute('readonly');
                    instance.altInput.setAttribute('inputmode', 'none');
                }
            },
            
            // Conservamos tu diseño original intacto
            altInputClass: "w-full h-10 bg-white border border-gray-200 rounded-xl pl-10 pr-4 text-sm font-bold text-black outline-none focus:border-[#0071e3] focus:ring-1 focus:ring-[#0071e3] transition-all cursor-pointer hover:bg-gray-50 shadow-sm"
        });
    });
</script>
{% endblock %}
