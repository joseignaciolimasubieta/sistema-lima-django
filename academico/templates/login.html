{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Sistema de Gestión | G.E. LIMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Slate 50 */
        }
        
        /* Patrón sutil para el panel derecho corporativo */
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }
        
        /* Oculta la barra de desplazamiento pero permite hacer scroll */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ========================================================= */
        /* ANIMACIÓN PREMIUM DE LOGOTIPOS (SIN JS)                   */
        /* ========================================================= */
        .slider-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: fadeRotate 12s infinite ease-in-out;
            will-change: opacity, transform;
        }
        
        /* Desfase de tiempos para que aparezcan uno tras otro (4 segundos c/u) */
        .slider-img:nth-child(1) { animation-delay: 0s; }
        .slider-img:nth-child(2) { animation-delay: 4s; }
        .slider-img:nth-child(3) { animation-delay: 8s; }

        @keyframes fadeRotate {
            0% { opacity: 0; transform: scale(0.95); }
            10%, 25% { opacity: 1; transform: scale(1); } /* Visible y perfecto */
            35%, 100% { opacity: 0; transform: scale(1.05); } /* Se difumina hacia adelante */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">

    <!-- Luces de fondo ambientales -->
    <div class="absolute top-[-15%] left-[-10%] w-[500px] h-[500px] bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-15%] right-[-10%] w-[500px] h-[500px] bg-slate-400/20 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Contenedor Principal (Tarjeta Dividida) -->
    <div class="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.08)] flex flex-col lg:flex-row overflow-hidden relative z-10 border border-slate-100 min-h-[600px]">
        
        <!-- ================================================== -->
        <!-- COLUMNA IZQUIERDA: FORMULARIO DE ACCESO            -->
        <!-- ================================================== -->
        <div class="w-full lg:w-1/2 p-8 sm:p-12 lg:p-16 flex flex-col justify-center relative bg-white hide-scrollbar overflow-y-auto">
            
            <!-- Carrusel de Logos versión Móvil (Oculto en escritorio) -->
            <div class="lg:hidden flex justify-center mb-8 mt-4">
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 w-40 h-40 relative overflow-hidden">
                    <div class="relative w-full h-full rounded-[inherit] overflow-hidden">
                        <img src="{% static 'logo.jpg' %}" class="slider-img object-contain p-4 bg-white" alt="G.E. LIMA">
                        <img src="{% static 'luca_pacioli.jpg' %}" class="slider-img object-cover" alt="Luca Pacioli">
                        <img src="{% static 'consultora_preview.jpg' %}" class="slider-img object-cover" alt="Consultora">
                    </div>
                </div>
            </div>

            <!-- Títulos del Formulario (Restaurado como pediste) -->
            <div class="mb-10 text-center lg:text-left">
                <h1 class="text-3xl sm:text-4xl font-bold text-blue-600 tracking-tight mb-2">Iniciar Sesión</h1>
                <p class="text-gray-500 text-sm font-medium">Bienvenido de nuevo. Por favor ingresa tus datos.</p>
            </div>

            <!-- Formulario de Acceso -->
            <form method="POST" class="space-y-5 w-full max-w-md mx-auto lg:mx-0">
                {% csrf_token %}
                
                <!-- Input: Usuario -->
                <div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" name="username" required placeholder="Nombre de usuario o correo"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50/70 border border-slate-200 rounded-2xl text-slate-900 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-600/10 focus:border-blue-600 transition-all duration-300 font-medium">
                    </div>
                </div>

                <!-- Input: Contraseña -->
                <div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" name="password" id="password_field" required placeholder="Contraseña"
                            class="w-full pl-12 pr-12 py-4 bg-slate-50/70 border border-slate-200 rounded-2xl text-slate-900 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-600/10 focus:border-blue-600 transition-all duration-300 font-medium">
                        
                        <!-- Botón Ojo -->
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-600 transition-colors focus:outline-none">
                            <svg id="eye_closed" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eye_open" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Botón Submit -->
                <div class="pt-2">
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-2xl shadow-[0_8px_20px_rgba(37,99,235,0.25)] hover:shadow-[0_10px_25px_rgba(37,99,235,0.35)] transform active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 relative overflow-hidden group">
                        <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                        <span class="relative z-10 text-[14px]">Iniciar Sesión</span>
                    </button>
                </div>
            </form>

            <!-- Alerta de Error -->
            {% if form.errors %}
            <div class="mt-8 p-4 bg-red-50 rounded-2xl border border-red-100 flex items-start gap-3 w-full max-w-md mx-auto lg:mx-0">
                <div class="bg-white rounded-full p-1 shadow-sm mt-0.5 shrink-0">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <p class="text-red-600 text-sm font-semibold leading-snug">Credenciales incorrectas.<br><span class="font-normal opacity-90">Verifica tu usuario y contraseña.</span></p>
            </div>
            {% endif %}
            
        </div>

        <!-- ================================================== -->
        <!-- COLUMNA DERECHA: CARRUSEL DE MARCAS Y ESTILO VIP   -->
        <!-- ================================================== -->
        <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-[#0f172a] via-[#1e3a8a] to-[#172554] p-16 flex-col justify-center relative overflow-hidden bg-pattern">
            
            <!-- Brillo interno decorativo -->
            <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px]"></div>
            <div class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-500/20 rounded-full blur-[100px]"></div>

            <!-- Contenedor del Carrusel de Logos (Gigante y Flotante) -->
            <div class="relative z-10 flex justify-center mb-12">
                <div class="bg-white rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/20 transform hover:scale-105 transition-transform duration-500 w-64 h-64 relative overflow-hidden ring-8 ring-white/10">
                    
                    <!-- Lógica de Rotación CSS -->
                    <div class="relative w-full h-full rounded-[inherit] overflow-hidden bg-white">
                        <!-- 1. Logo G.E. LIMA (Fondo Blanco) -->
                        <img src="{% static 'logo.jpg' %}" class="slider-img object-contain p-6" alt="G.E. LIMA">
                        
                        <!-- 2. Logo Luca Pacioli (Fondo Oscuro -> object-cover lo llena perfecto) -->
                        <img src="{% static 'luca_pacioli.jpg' %}" class="slider-img object-cover" alt="Luca Pacioli">
                        
                        <!-- 3. Consultora Lima (Imagen Fotográfica) -->
                        <img src="{% static 'consultora_preview.jpg' %}" class="slider-img object-cover" alt="Consultora Lima">
                    </div>

                </div>
            </div>

            <!-- Título Corporativo Imponente (A la derecha) -->
            <div class="relative z-10 text-center">
                <p class="text-[#d4af37] font-bold text-xs tracking-[0.3em] uppercase mb-3 drop-shadow-md">Portal Oficial</p>
                <h2 class="text-3xl xl:text-4xl font-black text-white tracking-tight leading-[1.15] uppercase drop-shadow-md">
                    Grupo Empresarial<br>
                    LIMA S.R.L.
                </h2>
            </div>

        </div>

    </div>

    <!-- Scripts Extra -->
    <style>
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password_field');
            const eyeOpen = document.getElementById('eye_open');
            const eyeClosed = document.getElementById('eye_closed');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeClosed.classList.add('hidden');
                eyeOpen.classList.remove('hidden');
            } else {
                passwordField.type = 'password';
                eyeClosed.classList.remove('hidden');
                eyeOpen.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
