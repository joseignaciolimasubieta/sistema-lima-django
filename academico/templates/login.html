{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - LIMA S.R.L.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Suavizado de fuentes y fondo con gradiente sutil */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f5f5f7;
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #e5e5ea 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-sans">

    <div class="relative bg-white/90 backdrop-blur-xl p-10 rounded-[28px] shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] w-full max-w-[400px] border border-white/60 overflow-hidden">
        
        <div class="absolute inset-0 z-0 opacity-[0.06] pointer-events-none" 
             style="background-image: url('{% static "logo.jpg" %}'); background-size: 85%; background-position: center 35%; background-repeat: no-repeat;">
        </div>
        
        <div class="relative z-10">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-[18px] bg-blue-50 text-blue-900 mb-6 shadow-sm border border-blue-100/50">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">LIMA S.R.L.</h1>
                <p class="text-[13px] text-gray-500 mt-2 font-medium uppercase tracking-wider">Portal de Gestión</p>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div class="relative">
                    <label class="block text-gray-500 text-[13px] font-semibold mb-2 ml-1">Usuario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" name="username" required placeholder="Tu usuario"
                            class="w-full pl-11 pr-4 py-3.5 bg-white/70 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-900/10 focus:border-blue-900 transition-all duration-300 relative z-20">
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-gray-500 text-[13px] font-semibold mb-2 ml-1">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" name="password" id="password_field" required placeholder="••••••••"
                            class="w-full pl-11 pr-12 py-3.5 bg-white/70 border border-gray-200 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-900/10 focus:border-blue-900 transition-all duration-300 relative z-20">
                        
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-blue-900 transition-colors focus:outline-none z-30">
                            <svg id="eye_open" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eye_closed" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-medium py-3.5 px-4 rounded-2xl shadow-lg shadow-blue-900/20 transform hover:-translate-y-0.5 transition-all duration-200 relative z-20">
                        Iniciar Sesión
                    </button>
                </div>
            </form>

            {% if form.errors %}
            <div class="mt-6 p-4 bg-red-50 rounded-2xl border border-red-100 flex items-center gap-3 animate-pulse relative z-20">
                <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p class="text-red-700 text-sm font-medium">Credenciales incorrectas. Inténtalo de nuevo.</p>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password_field');
            const eyeOpen = document.getElementById('eye_open');
            const eyeClosed = document.getElementById('eye_closed');

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            } else {
                passwordField.type = 'password';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            }
        }
    </script>

</body>
</html>
