{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<div class="max-w-4xl mx-auto px-4 pt-10 pb-16 animate-fade-in relative z-10 font-sans">
    
    <div class="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
        <div class="space-y-2">
            <h1 class="text-4xl md:text-5xl font-bold text-black tracking-tight">Editar Movimiento.</h1>
        </div>
        <a href="{% url 'flujo_caja' %}" class="shrink-0 inline-flex items-center justify-center gap-2 h-10 px-6 rounded-full bg-white hover:bg-gray-50 text-gray-800 border border-gray-300 text-xs font-bold uppercase tracking-widest transition-all shadow-sm">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver a Caja
        </a>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <!-- BLOQUE 1: Detalles de Operación -->
        <div class="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-sm space-y-6">
            <h3 class="text-[11px] font-black text-[#0071e3] uppercase tracking-widest flex items-center gap-2 mb-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                Ficha de Edición
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Fecha de Operación</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none z-10">
                            <svg class="w-4 h-4 text-[#0071e3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <input type="text" id="fecha" name="fecha" required value="{{ movimiento.fecha|date:'Y-m-d' }}" class="hidden">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Tipo de Movimiento</label>
                    <select name="tipo" required class="custom-select cursor-pointer">
                        <option value="ENTRADA" {% if movimiento.tipo == 'ENTRADA' %}selected{% endif %}>ENTRADA (Ingreso a Caja)</option>
                        <option value="SALIDA" {% if movimiento.tipo == 'SALIDA' %}selected{% endif %}>SALIDA (Egreso de Caja)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Detalle / Concepto</label>
                <input type="text" name="detalle" required value="{{ movimiento.detalle }}" class="custom-input uppercase placeholder-gray-400">
            </div>
        </div>

        <!-- BLOQUE 2: Liquidación Económica -->
        <div class="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-sm">
            <h3 class="text-[11px] font-black text-[#0071e3] uppercase tracking-widest flex items-center gap-2 mb-6">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0114 0z"></path></svg>
                2. Imputación Contable
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-blue-50/40 p-6 rounded-2xl border border-blue-100/50">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest">Cuenta de Caja</label>
                    <select name="cuenta_id" required class="custom-select cursor-pointer shadow-sm border-white">
                        {% for cuenta in cuentas %}
                            <option value="{{ cuenta.id }}" {% if movimiento.cuenta.id == cuenta.id %}selected{% endif %}>
                                {{ cuenta.codigo }} - {{ cuenta.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-[#0071e3] uppercase tracking-widest">Monto (Bs)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-600/60 font-black text-lg">Bs</span>
                        <input type="text" name="monto" required value="{{ movimiento.monto|stringformat:'s' }}" class="w-full h-12 bg-white border-2 border-blue-200/80 rounded-xl pl-12 pr-4 text-xl font-black text-[#0071e3] text-right outline-none focus:border-[#0071e3] focus:ring-4 focus:ring-blue-500/10 transition-all shadow-sm">
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 px-8 py-5 border border-gray-200 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div></div>
            <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                <a href="{% url 'flujo_caja' %}" class="w-full md:w-auto text-center h-11 px-8 rounded-full text-xs font-bold uppercase tracking-widest text-gray-500 bg-white border border-gray-300 hover:bg-gray-100 transition-colors shadow-sm flex items-center justify-center">
                    Cancelar
                </a>
                <button type="submit" class="w-full md:w-auto h-12 px-10 rounded-full text-xs font-bold uppercase tracking-widest text-white bg-[#0071e3] hover:bg-[#0077ED] shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    Actualizar Cambios
                </button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        flatpickr("#fecha", {
            locale: "es",
            disableMobile: true,
            dateFormat: "Y-m-d", 
            altInput: true,      
            altFormat: "j \\de F, Y", 
            onReady: function(selectedDates, dateStr, instance) {
                if (instance.altInput) {
                    instance.altInput.removeAttribute('readonly');
                    instance.altInput.setAttribute('inputmode', 'none');
                }
            },
            altInputClass: "custom-input custom-input-icon cursor-pointer"
        });

        // FORMATEADOR DE MONEDA PARA EL MONTO
        const inputMonto = document.querySelector('input[name="monto"]');
        if (inputMonto) {
            function darFormato() {
                let val = inputMonto.value.replace(/\./g, '').replace(',', '.');
                let num = parseFloat(val);
                if(!isNaN(num)) {
                    inputMonto.value = num.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
            }

            function quitarFormato() {
                let val = inputMonto.value.replace(/\./g, '').replace(',', '.');
                let num = parseFloat(val);
                if(!isNaN(num)) {
                    inputMonto.value = num.toFixed(2);
                }
            }

            inputMonto.addEventListener('blur', darFormato);
            inputMonto.addEventListener('focus', quitarFormato);

            // Si ya tiene valor al cargar la vista de Editar, lo formatea
            if (inputMonto.value.trim() !== '') {
                darFormato();
            }

            // Escudo Protector al guardar
            const form = inputMonto.closest('form');
            if (form) {
                form.addEventListener('submit', function() {
                    let valRaw = inputMonto.value.replace(/\./g, '').replace(',', '.');
                    inputMonto.value = valRaw;
                });
            }
        }
    });
</script>

<style>
    .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .custom-input, .custom-select {
        width: 100%;
        height: 2.75rem;
        background-color: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        font-weight: 700;
        color: #1a202c;
        outline: none;
        transition: all 0.2s ease;
    }
    .custom-input:focus, .custom-select:focus {
        background-color: #ffffff;
        border-color: #0071e3;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }
    .custom-input-icon {
        padding-left: 2.75rem !important;
    }
</style>
{% endblock %}
