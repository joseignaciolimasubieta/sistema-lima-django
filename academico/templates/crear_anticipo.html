{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@latest/dist/plugins/monthSelect/style.css">

<div class="max-w-4xl mx-auto px-4 pt-10 pb-8 animate-fade-in font-sans">
    
    <div class="mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
        <h1 class="text-4xl font-bold text-black tracking-tight">Dar Anticipo.</h1>
        <a href="{% url 'lista_anticipos' %}" class="h-10 px-6 inline-flex items-center justify-center gap-2 rounded-full bg-white hover:bg-gray-50 text-gray-800 border border-gray-300 text-[10px] font-black uppercase tracking-widest transition-all shadow-sm">
            Cancelar
        </a>
    </div>

    <form method="POST" class="bg-white rounded-[2rem] shadow-sm border border-gray-200 p-8 space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Empleado</label>
                <select name="empleado_id" required class="w-full h-12 bg-gray-50 border-2 border-gray-100 rounded-xl px-4 text-sm font-bold text-black outline-none focus:border-[#0071e3] transition-all uppercase">
                    {% for emp in empleados %}
                    <option value="{{ emp.id }}">{{ emp.nombre_completo }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-rose-500 uppercase tracking-widest">Monto a Entregar (Bs.)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-rose-600/60 font-black text-lg">Bs.</span>
                    <input type="number" step="0.01" name="monto" required placeholder="0.00" class="w-full h-12 bg-rose-50/40 border-2 border-rose-200/80 rounded-xl pl-12 pr-4 text-lg font-black text-rose-600 outline-none focus:border-rose-500 focus:bg-white transition-all placeholder-rose-300 text-right">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Fecha de Entrega</label>
                <input type="text" id="fecha" name="fecha" required value="{% now 'Y-m-d' %}" class="hidden">
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-[#0071e3] uppercase tracking-widest">Mes en que se Descontará</label>
                <input type="text-left" id="mes_descuento" name="mes_descuento" placeholder="SELECCIONAR MES..." required class="hidden">
            </div>

            <div class="space-y-2 md:col-span-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Cuenta de Retiro (Caja)</label>
                <select name="cuenta_origen_id" required class="w-full h-12 bg-gray-50 border-2 border-gray-100 rounded-xl px-4 text-sm font-bold text-black outline-none focus:border-[#0071e3] transition-all uppercase">
                    {% for c in cuentas %}
                    <option value="{{ c.id }}">{{ c.codigo }} - {{ c.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2 md:col-span-2">
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Observaciones</label>
                <input type="text" name="observaciones" placeholder="EJ: ANTICIPO POR VIAJE..." class="w-full h-12 bg-gray-50 border-2 border-gray-100 rounded-xl px-4 text-sm font-bold text-black outline-none focus:border-[#0071e3] transition-all uppercase">
            </div>
        </div>

        <button type="submit" class="w-full mt-6 h-14 rounded-full text-xs font-black text-white bg-black hover:bg-gray-800 transition-all shadow-md uppercase tracking-widest">
            Entregar Anticipo
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@latest/dist/plugins/monthSelect/index.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // 1. Calendario de Fecha Exacta
        flatpickr("#fecha", { 
            locale: "es", 
            disableMobile: true, // 🚀 Fuerza el diseño web
            altInput: true, 
            altFormat: "d F Y", 
            onReady: function(selectedDates, dateStr, instance) {
                if (instance.altInput) {
                    instance.altInput.removeAttribute('readonly');
                    instance.altInput.setAttribute('inputmode', 'none'); // 🚀 Bloquea el teclado nativo
                }
            },
            altInputClass: "w-full h-12 bg-white border-2 border-gray-200 rounded-xl px-4 text-sm font-bold text-black uppercase outline-none focus:border-[#0071e3] text-center cursor-pointer" 
        });

        // 2. Calendario Selector de Mes (Para el descuento)
        flatpickr("#mes_descuento", { 
            locale: "es", 
            disableMobile: true, // 🚀 Fuerza el diseño web
            plugins: [new monthSelectPlugin({ shorthand: false, dateFormat: "Y-m", altFormat: "F Y" })], 
            altInput: true, 
            onReady: function(selectedDates, dateStr, instance) {
                if (instance.altInput) {
                    instance.altInput.removeAttribute('readonly');
                    instance.altInput.setAttribute('inputmode', 'none'); // 🚀 Bloquea el teclado nativo
                }
            },
            altInputClass: "w-full h-12 bg-blue-50/40 border-2 border-blue-200 rounded-xl px-4 text-sm font-black text-[#0071e3] uppercase outline-none focus:border-[#0071e3] text-center cursor-pointer" 
        });
        
    });
</script>
{% endblock %}
