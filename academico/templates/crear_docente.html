{% extends 'base.html' %}
{% block content %}

<div class="max-w-3xl mx-auto px-4 md:px-8 pb-16 pt-10 animate-fade-in relative z-10 font-sans">
    
    <div class="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-6">
        <div class="space-y-3">
            <h1 class="text-5xl md:text-6xl font-bold text-black tracking-tight">Docentes.</h1>
        </div>
        
        <a href="{% url 'cursos' %}" class="shrink-0 inline-flex items-center justify-center gap-2 h-10 px-6 rounded-full bg-white hover:bg-gray-50 text-gray-800 border border-gray-300 text-xs font-semibold transition-all shadow-sm">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver a Cursos
        </a>
    </div>

    <form method="POST" class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-visible relative">
        {% csrf_token %}
        
        <div class="bg-slate-50 px-8 py-6 border-b-2 border-slate-200 flex justify-between items-center rounded-t-3xl">
            <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <svg class="w-4 h-4 text-[#0071e3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Ficha del Profesional
            </h3>
        </div>

        <div class="p-8 md:p-10 space-y-6">
            
            <div class="flex flex-col">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Nombre Completo del Docente <span class="text-rose-500"></span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-10">
                        <svg class="w-5 h-5 text-[#0071e3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input type="text" name="nombre" required placeholder="EJ. JUAN PEREZ..." autocomplete="off"
                           class="w-full h-14 bg-slate-50 border-2 border-slate-100 rounded-xl pl-14 pr-4 text-base font-bold text-black uppercase outline-none focus:bg-white focus:border-[#0071e3] focus:ring-4 focus:ring-[#0071e3]/10 transition-all shadow-sm">
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-3 px-2">Este nombre aparecerá en la asignación de cursos, asistencia y pago de honorarios.</p>
            </div>

        </div>

        <div class="bg-slate-50 px-8 py-6 border-t border-slate-200 flex flex-col md:flex-row justify-end items-center gap-4 rounded-b-3xl">
            <a href="{% url 'cursos' %}" class="w-full md:w-auto text-center h-12 px-8 rounded-full text-xs font-bold uppercase tracking-widest text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 transition-colors shadow-sm flex items-center justify-center">
                Cancelar
            </a>
            
            <button type="submit" class="w-full md:w-auto h-12 px-10 rounded-full text-xs font-bold uppercase tracking-widest text-white bg-[#0071e3] hover:bg-[#0077ED] shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
                <svg class="w-4 h-4 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                Registrar Docente
            </button>
        </div>
    </form>
</div>

<style>
    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInDown 0.4s ease-out forwards; }
</style>

{% endblock %}
